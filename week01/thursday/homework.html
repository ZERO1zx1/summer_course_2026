<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <h1>Your Information</h1>
    <form action="">
        <h2>Personal Information</h2>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br>

        <label for="number">Phone Number:</label>
        <input type="tel" id="number" name="number" placeholder="Enter your phone number">
        <br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <br>

    </form>

    <table border="1">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Number</th>
        </tr>
        <tr>
            <td>
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name" name="firstname" placeholder="Enter your first name" required>
            </td>
            <td>
                <label for="last-name">Last Name:</label>
                <input type="text" id="last-name" name="lastname" placeholder="Enter your last name" required>
            </td>
            <td>
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            </td>
        </tr>
    </table>

    
</body>

</html>
